<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #101010;
            color: #ffffff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 700px;
            padding: 40px 20px;
        }

        h1 {
            font-size: 120px;
            font-weight: 900;
            margin: 0;
            background: linear-gradient(90deg, #ff3333, #ff5555);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }

        .subtitle {
            font-size: 28px;
            margin: 20px 0 30px 0;
            color: #ff6666;
        }

        p {
            font-size: 18px;
            color: #aaaaaa;
            margin-bottom: 40px;
        }

        a {
            color: #ffd700;
            text-decoration: none;
            font-weight: 600;
            font-size: 18px;
            padding: 12px 28px;
            border: 2px solid #ffd700;
            border-radius: 8px;
            transition: all 0.3s;
        }

        a:hover {
            background-color: #ffd700;
            color: black;
            transform: translateY(-2px);
        }

        footer {
            margin-top: auto;
            padding: 40px 0 20px;
            color: #555;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <div class="subtitle">Page Not Found</div>
        <p>This page does not exist or has been moved.</p>
        <a href="index.html">← Go Back to Home</a>
    </div>

    <footer>
        <p>Not affiliated with Discord • For educational purposes only</p>
    </footer>
</body>
</html>
