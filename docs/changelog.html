<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quest Grabber - Changelog</title>
    <style>
        body { margin: 0; padding: 20px; background-color: #0f0f0f; color: #ffffff; font-family: 'Segoe UI', system-ui, sans-serif; line-height: 1.6; }
        h1 { color: #ffd700; }
        .version { color: #ffd700; font-weight: bold; margin-top: 20px;}
        ul { padding-left: 20px; }
        #last-updated { margin-top: 40px; color: #666; font-size: 14px; }
    </style>
</head>
<body>
    <h1>Quest Grabber Changelog</h1>
    
    <div id="changelog-container">Loading changelog...</div>
    <p id="last-updated"></p>

    <script>
        fetch('config.json')
            .then(response => response.json())
            .then(config => {
                const container = document.getElementById('changelog-container');
                container.innerHTML = ''; // clear loading state

                config.changelog.forEach(log => {
                    const versionNode = document.createElement('p');
                    versionNode.className = 'version';
                    versionNode.textContent = log.version;

                    const ulNode = document.createElement('ul');
                    log.changes.forEach(change => {
                        const liNode = document.createElement('li');
                        liNode.textContent = change;
                        ulNode.appendChild(liNode);
                    });

                    container.appendChild(versionNode);
                    container.appendChild(ulNode);
                });

                document.getElementById('last-updated').textContent = `Last updated: ${config.lastUpdated}`;
            })
            .catch(err => {
                document.getElementById('changelog-container').textContent = "Failed to load changelog data.";
                console.error(err);
            });
    </script>
</body>
</html>
